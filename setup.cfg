[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml

[coverage:run]
source = .
omit = 
    venv/*
    */venv/*
    env/*
    */env/*
    .venv/*
    */.venv/*
    tests/*
    */tests/*
    setup.py
    conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:

[flake8]
max-line-length = 127
exclude = 
    .git,
    __pycache__,
    venv,
    env,
    .venv,
    build,
    dist,
    *.egg-info
ignore = 
    E203,
    W503

[isort]
profile = black
multi_line_output = 3
line_length = 127
skip = venv,env,.venv,build,dist